apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: guestbook-demo
  namespace: argocd

spec:
  project: default
  source:
    repoURL: https://github.com/akshay53156/jenkins-cicd.git
    targetRevision: HEAD
    path: java-maven-sonar-argocd-helm-k8s/spring-boot-app-manifests

  destination:
    server: https://kubernetes.default.svc
    namespace: guestbook

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
